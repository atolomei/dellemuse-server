
<wicket:panel>
	<form wicket:id="personForm">
		<fieldset>
			<div style="float: left; width: 100%;" class="mb-3 mt-3 mr-0" wicket:id="buttons-top"></div>


			<div class="row">
				<div class="mt-3 mb-4 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">

					<h3>
						<wicket:message key="site-user" />
					</h3>
				</div>
			</div>

			<div class="mb-4" wicket:id="username"></div>
			<div class="mb-4" wicket:id="email"></div>
			<div class="mb-4" wicket:id="zoneid"></div>
			<div class="mb-4" wicket:id="locale"></div>
			<div style="float: left; width: 100%;" class="mb-3 mt-3 mr-0" wicket:id="buttons"></div>

		</fieldset>
	</form>

	<div class="mt-2 mb-2" wicket:id="error"></div>


</wicket:panel>
