<wicket:panel>

	<div class="row">
		<div class="mt-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<h4>
				<wicket:message key="title" />
			</h4>
		</div>
	</div>

	<!-- Date Range Selector -->
	<div class="row">
		<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<b><wicket:message key="date-range" /></b>
		</div>
	</div>


	<div class="row">
		<div class="mt-0 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<select wicket:id="rangeSelector" class="form-select text-center text-md-start" style="font-size: 0.95em;"></select>
		</div>
	</div>


	<div wicket:id="reportContainer">




		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<span><b><wicket:message key="sessions" /></b></span>
			</div>
		</div>


		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item">
						<div class="row">
							<div class="col-8 text-start">
								<wicket:message key="total-sessions" />
							</div>
							<div class="col-4 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="totalSessions"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>



		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<b><wicket:message key="languages" /></b>
			</div>
		</div>


		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item" wicket:id="langList">
						<div class="row">
							<div class="col-8 text-start">
								<span wicket:id="langLabel"></span>
							</div>
							<div class="col-4 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="langVisits"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>




		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<b><wicket:message key="artexhibition-guides" /></b>
			</div>
		</div>


		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item" wicket:id="contentList">
						<div class="row">
							<div class="col-8 text-start">
								<a wicket:id="guideContentLink" class="btn-link"><span wicket:id="artWorkName"></span></a>
							</div>
							
							<div class="col-4 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="contentSessions"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>

	</div>

</wicket:panel>
