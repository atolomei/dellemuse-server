
<wicket:panel>

	<div class="row">

		<div class="mt-1 mb-0 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">

			<div class="mb-0 alert alert-primary text-center text-lg-start text-xl-start text-xxl-start">
				<div class="row">
					<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
						<span wicket:id="info"></span>
					</div>
				</div>

				<div class="row">
					<div class="mt-2 mb-2 pt-2 pb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
						<a wicket:id="testlink"> <wicket:message key="test" /></a>
					</div>
				</div>

				<div class="row">
					<div
						class="mt-2 mb-2 pt-1 pb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12 text-center text-md-start">
						<a class="btn btn-sm btn-outline-primary" wicket:id="closelink"><wicket:message key="close" /></a>
					</div>
				</div>

				<div wicket:id="test">

					<div class="row">
						<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<div class="border mt-3 mb-2 w-100 pt-2 pb-2 ps-3 pe-3" wicket:id="audioVoice"
								style="border-color: #ecf3fd !important"></div>
						</div>
					</div>

					<div class="row">
						<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12 ms-2 mb-2 mt-0 ps-2 pe-2">
							<span class=" w-100" wicket:id="audioMeta"></span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

</wicket:panel>
