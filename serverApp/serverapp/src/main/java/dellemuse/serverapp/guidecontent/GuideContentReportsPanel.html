<wicket:panel>

	<div class="row">
		<div class="mt-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<h4>
				<wicket:message key="title" />
			</h4>
		</div>
	</div>

	<!-- Date Range Selector -->
	<div class="row">
		<div class="mt-2 mb-3 col-xxl-4 col-xl-4 col-lg-6 col-md-6 col-sm-12 col-xs-12">
			<label class="form-label text-muted"><wicket:message key="date-range" /></label>
			<select wicket:id="rangeSelector" class="form-select"></select>
		</div>
	</div>

	<div wicket:id="reportContainer">

		<div class="row">
			<div class="mt-2 mb-2 col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-12 col-xs-12">
				<div class="card">
					<div class="card-body">
						<h5 class="card-title text-muted">
							<i class="fa-duotone fa-chart-line"></i> <wicket:message key="total-sessions" />
						</h5>
						<p class="card-text fs-3 fw-bold">
							<span wicket:id="totalSessions"></span>
						</p>
					</div>
				</div>
			</div>
		</div>

	</div>

</wicket:panel>
