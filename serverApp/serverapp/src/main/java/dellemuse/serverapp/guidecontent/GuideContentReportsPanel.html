<wicket:panel>

	<div class="row">
		<div class="mt-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<h4>
				<wicket:message key="title" />
			</h4>
		</div>
	</div>

	<!-- Date Range Selector -->
	<div class="row">
		<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<b><wicket:message key="date-range" /></b>
		</div>
	</div>

	<div class="row">
		<div class="mt-0 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<select wicket:id="rangeSelector" class="form-select" style="font-size: 0.95em;"></select>
		</div>
	</div>

	<div wicket:id="reportContainer">

		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<span><b><wicket:message key="users" /></b></span>
			</div>
		</div>

		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item">
						<div class="row">
							<div class="col-8 text-start">
								<wicket:message key="total-users" />
							</div>
							<div class="col-4 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="totalSessions"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>

		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<b><wicket:message key="languages" /></b>
			</div>
		</div>


		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item" wicket:id="langList">
						<div class="row">
							<div class="col-8 text-start">
								<span wicket:id="langLabel"></span>
							</div>
							<div class="col-4 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="langVisits"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>

		<div wicket:id="otherGuidesContainer">
			<div class="row">
				<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<b><wicket:message key="other-guides" /></b>
				</div>
			</div>
			<div class="row">
				<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<ul class="list-group">
						<li class="list-group-item" wicket:id="otherGuidesList">
							<div class="row">
								<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
									<a wicket:id="otherGuideLink" class="btn-link"><span wicket:id="otherGuideName"></span></a>
								</div>
							</div>
						</li>
					</ul>
				</div>
			</div>
		</div>

	</div>

</wicket:panel>
