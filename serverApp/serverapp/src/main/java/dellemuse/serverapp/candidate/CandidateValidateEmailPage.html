
<html xmlns:wicket="http://wicket.apache.org">
<body>
	<wicket:extend>

		<section wicket:id="top-panel" />

		<section class="text-center container main">


			<div class="row justify-content-center">
				<div class="mt-4 mb-4 col-md-6  ">
					<h1>
						<wicket:message key="validate-email" />
					</h1>
				</div>
			</div>

			<div class="row justify-content-center">
				<div class="mt-0 mb-5 col-md-6">
					<div wicket:id="error" />
					<div wicket:id="info" />
					<div wicket:id="success" />

					<div class="row">
						<div class=" col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="btn-link" href="/signin"><wicket:message key="login-page" /></a>
						</div>
					</div>


				</div>
			</div>



		</section>

		<section style="float: left; width: 100%;" wicket:id="footer-panel" />

	</wicket:extend>
</body>
</html>
