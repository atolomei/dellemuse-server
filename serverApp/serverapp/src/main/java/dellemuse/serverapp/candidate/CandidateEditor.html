<wicket:panel>
	<form wicket:id="candidateForm" class="mb-4">
		<fieldset>

			<div class="mb-4 mt-0 mr-0" wicket:id="buttons-top"></div>

			<div class="row">
				<div class="mt-2 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2">
					<h3>
						<wicket:message key="candidate" />
					</h3>
				</div>
			</div>

			<div class="mb-4" wicket:id="institutionName"></div>
			<div class="mb-4" wicket:id="institutionAddress"></div>
			<div class="mb-4" wicket:id="comments"></div>
			<div class="mb-4" wicket:id="name"></div>
			<div class="mb-4" wicket:id="lastname"></div>
			<div class="mb-4" wicket:id="email"></div>
			<div class="mb-4" wicket:id="phone"></div>

			<div class="row">
				<div class="mt-4 mb-2 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2">
					<h3>
						<wicket:message key="internal-use" />
					</h3>
				</div>
			</div>

			<div class="mb-4" wicket:id="emailValidated"></div>
			<div class="mb-4" wicket:id="validationEmailSent"></div>
			<div class="mb-4" wicket:id="created"></div>
			<div class="mb-4" wicket:id="lastModified"></div>
			<div class="mb-4" wicket:id="status"></div>
			<div class="mb-4" wicket:id="internalcomments"></div>

			<div style="float: left; width: 100%;" class="mb-4 mt-3 mr-0" wicket:id="buttons"></div>

		</fieldset>
	</form>

	<div class="mt-2 mb-2" wicket:id="success"></div>

	<div class="mt-2 mb-2" wicket:id="error"></div>

	<div class="mt-4 mb-4"></div>

</wicket:panel>
