<wicket:panel>
	<form wicket:id="candidateForm" class="mb-4">
		<fieldset>

			<div class="mb-4 mt-0 mr-0" wicket:id="buttons-top"></div>

			<div class="row">
				<div class="mt-2 mb-4 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2">
					<h3>
						<wicket:message key="user" />
					</h3>
				</div>
			</div>

			<div class="mb-0" wicket:id="userInfo"></div>

			<div class="row">
				<div class="mt-2 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2">
					<a class="btn btn-link" wicket:id="createUser"> <wicket:message key="create-user" /></a>
				</div>
			</div>

			<div class="row">
				<div class="mt-2 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2">
					<a class="btn btn-link" wicket:id="sendEmail"> <wicket:message key="sendEmail" /></a>
				</div>
			</div>

			<div style="float: left; width: 100%;" class="mb-4 mt-3 mr-0" wicket:id="buttons"></div>



		</fieldset>
	</form>

	<div class="mt-2 mb-2" wicket:id="success"></div>
	<div class="mt-2 mb-2" wicket:id="error"></div>

	<div class="row">
		<div class="mt-5 mb-5 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mb-2"></div>
	</div>


</wicket:panel>
