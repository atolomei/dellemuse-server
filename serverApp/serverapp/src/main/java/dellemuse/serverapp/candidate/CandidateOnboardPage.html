
<html xmlns:wicket="http://wicket.apache.org">
<body>
	<wicket:extend>

		<section wicket:id="top-panel" />

		<section class="container main">


			<div class="row justify-content-center">
				<div class="mt-4 mb-4 col-md-6  ">
					<h1>
						<wicket:message key="onboarding" />
					</h1>
				</div>
			</div>

			<div class="row justify-content-center">
				<div class="mt-0 mb-2 col-md-6">
					<div class="text-center-md text-start alert alert-primary">
						<p>
							<wicket:message key="notice" />
						</p>
					</div>
				</div>
			</div>

			<div class="row justify-content-center">
				<div class="mt-0 mb-2 col-md-6">
					<div wicket:id="candidateEditor" />
				</div>
			</div>


			<div class="row justify-content-center">
				<div class="mt-0 mb-5 col-md-6">
					<a href="/signin"> <wicket:message key="signin"/></a>
				
				</div>
			</div>


		</section>

		<section style="float: left; width: 100%;" wicket:id="footer-panel" />

	</wicket:extend>
</body>
</html>
