
<wicket:panel>


	<div class="row justify-content-center">
		<div class="mt-0 mb-2 col-md-12">
			<div class="   text-start alert alert-primary">
				<p>
					<span wicket:id="notice" />
				</p>
			</div>
		</div>
	</div>

	<form wicket:id="personForm">
		<fieldset>
			<!-- div class="mb-4" wicket:id="username"></div -->
			<div class="mb-4  " wicket:id="password"></div>


			<div class="row">
				<div class="text-center mt-4 mb-0 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
					<div class="mt-0 mb-0 float-left d-inline-block" wicket:id="send" />
				</div>
			</div>
			
			<div class="row">
				<div class="text-center mt-4 mb-0 col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
					<a href="/signin"> <wicket:message key="signin"/></a>
				</div>
			</div>

		</fieldset>
	</form>


	<div class="mt-2 mb-2" wicket:id="success"></div>

	<div class="mt-2 mb-2" wicket:id="error"></div>



</wicket:panel>
