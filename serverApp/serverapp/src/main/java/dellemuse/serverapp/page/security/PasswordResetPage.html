
<html xmlns:wicket="http://wicket.apache.org">
<body>
	<wicket:extend>

		<section wicket:id="top-panel" />

		<section class="text-center container main">

			<div class="row justify-content-center">
				<div class="mt-4 mb-4 col-md-6  ">
					<h1>
						<wicket:message key="password-reset" />
					</h1>
				</div>
			</div>

			<div class="row justify-content-center">
				<div class="mt-0 mb-5 col-md-6">
					<div wicket:id="error" />
					<div wicket:id="editor" />
				</div>
			</div>

			<div class="row">
				<div class="text-center  mt-2 mb-0 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
					<a class="text-light" href="/signin"><wicket:message key="login-page" /></a>
				</div>
			</div>

			<div class="row justify-content-center">
				<div class="mt-0 mb-5 col-md-6"></div>
			</div>

		</section>

		<section style="float: left; width: 100%;" wicket:id="footer-panel" />

	</wicket:extend>
</body>
</html>
