<wicket:panel>

	<div class="row">
		<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 text-lg-start text-md-start text-xs-center">

			<div class="row">

				<div class="mt-2 mb-2 col-xxl-2 col-xl-2 col-lg-3 col-md-3 col-sm-12 col-xs-12 text-bg-light border pt-0 pb-0 ps-0 pe-0"
					style="position: relative; float: left; height:10em; overflow:hidden;">
					<img class="img-fluid centered" style="max-height: 15em;" wicket:id="thumbnail" />
				</div>

				<div class="mt-2 mb-2 col-xxl-10 col-xl-10 col-lg-9 col-md-9 col-sm-12 col-xs-12">

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							<span wicket:id="siteName"></span>
						</div>
					</div>

					 

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							<span class="me-1" wicket:id="masterLanguage"></span><span class="text-secondary small">( <wicket:message key="master"/> ) </span>
							 
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							 
							<span  wicket:id="secondaryLanguages"></span>
						</div>
					</div>


					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							<a wicket:id="portalLink" target="_blank"> <span wicket:id="publicPortal"/> </a>
						</div>
					</div>

				</div>
			</div>

		</div>

		<div wicket:id="error" />

	</div>

</wicket:panel>
