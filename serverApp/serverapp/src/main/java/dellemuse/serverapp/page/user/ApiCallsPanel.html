<wicket:panel>

	<div class="row">
		<div class="mt-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<h4>
				<wicket:message key="title" />
			</h4>
		</div>
	</div>

	<div class="row">
		<div class="mt-2 mb-2 col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-12 col-xs-12">
			<div class="card">
				<div class="card-body">
					<h5 class="card-title text-muted">
						<wicket:message key="total-calls" />
					</h5>
					<p class="card-text fs-3 fw-bold">
						<span wicket:id="totalCalls"></span>
					</p>
				</div>
			</div>
		</div>

		<div class="mt-2 mb-2 col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-12 col-xs-12">
			<div class="card">
				<div class="card-body">
					<h5 class="card-title text-muted">
						<wicket:message key="total-characters" />
					</h5>
					<p class="card-text fs-3 fw-bold">
						<span wicket:id="totalCharacters"></span>
					</p>
				</div>
			</div>
		</div>
	</div>

</wicket:panel>
