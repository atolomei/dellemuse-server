<wicket:panel>


	<div class="mt-2 mb-0" wicket:id="info"></div>

	<div class="row">
			<div class="mt-3 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
				<h3>
					<span wicket:id="site-public-portal" />
				</h3>
		</div>
	</div>

	<div class="row">
		<div class="col-xxl-12 col-xl-12 col-lg-12 c col-md-12 col-sm-12">
			<form wicket:id="siteForm">
				<fieldset>
					<div class="mb-4 mt-0 mr-0" wicket:id="buttons-top"></div>
					<div class="mb-4" wicket:id="publicPortalEnabled"></div>
					<div class="row">
						<div class="col-xxl-12 col-xl-12 col-lg-12 c col-md-12 col-sm-12">
			            	<b><wicket:message key="url" /></b>
			            </div>	
			         </div>   
					<div class="row">
						<div class="mb-4 pt-2 pb-2 col-xxl-12 col-xl-12 col-lg-12 c col-md-12 col-sm-12">
							<a wicket:id="link" target="_blank" href="#"> <span wicket:id="portal">http://localhost:8099/ag/137</span></a>
						</div>
					</div>
					<div class="mb-4 mt-4 mr-0" wicket:id="buttons-bottom"></div>
				</fieldset>
			</form>
		</div>
	</div>
	
	<div class="mt-2 mb-2" wicket:id="error"></div>

</wicket:panel>
