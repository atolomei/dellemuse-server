<wicket:panel>

	<div class="row">
		<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 text-lg-start text-md-start text-xs-center">

			<div class="row">

				<div class="mt-2 mb-2 col-xxl-2 col-xl-2 col-lg-3 col-md-3 col-sm-12 col-xs-12 text-bg-light border pt-0 pb-0 ps-0 pe-0"
					style="position: relative; float: left; height:10em; overflow:hidden;">
					<img class="img-fluid centered" style="height: 10em;" wicket:id="thumbnail" />
				</div>

				<div class="mt-2 mb-2 col-xxl-10 col-xl-10 col-lg-9 col-md-9 col-sm-12 col-xs-12">

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							<span wicket:id="itemName"></span>
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							<span wicket:id="artists"></span>
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
						  <span wicket:id="floor"></span>
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							 <span wicket:id="room"></span>
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
							 <wicket:message key="order"/>. <span wicket:id="exhibitionOrder"></span>
						</div>
					</div>

				</div>
			</div>

		</div>
	</div>

</wicket:panel>
