
<wicket:panel>


	<div wicket:id="infoContainer" class="pt-0 pb-3 mb-1" style="float: left; width: 100%; padding: 0;">


		<div class="row">
			<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
				<div class="text-center">
					<div class="border ps-1 pe-1 pt-1 pb-1" style="display: inline-block;">
						<i class="ps-1 pe-1 fa-duotone fa-solid fa-headphones"></i> <span wicket:id="aid" class="ps-1 pe-1">21</span>
					</div>
				</div>
			</div>
		</div>

		<div class="mt-3" wicket:id="error" />

	</div>


	<div class="pb-4 mb-4 border-bottom-none "
		style="float: left; width: 100%; padding: 0; margin-bottom: 132px !important;">
		<div class="row">
			<div class="mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
				<h3>
					<wicket:message key="artwork-audios" />
				</h3>
			</div>
		</div>

		<div class="row">
			<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
				<div style="float: left; width: 100%;" wicket:id="items"></div>
			</div>
		</div>
	</div>

	<div wicket:id="audioContainer" class="alert alert-info audio-fixed-bottom"
		style="border-left: none; border-right: none;">

		<div class="row d-block   ">
			<div class="small mt-3 mb-1 text-center col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<span class="ps-4 pe-4" style="font-size: 0.9em; font-weight: bold; text-transform: uppercase;"> <wicket:message
						key="intro-exhibition" />
				</span>
			</div>
		</div>

		<div class="row">
			<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<div class="ps-0 pe-0 pt-1 pb-3">
					<div class="row align-items-center">
						<div class="  col">
							<div wicket:id="intro-audio" class="w-100">
								<div wicket:id="audioIntro" class="w-100"></div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>



</wicket:panel>
