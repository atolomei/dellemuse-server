
<wicket:panel>

	<div wicket:id="infoContainer" class="mb-4 border-none" style="float: left; width: 100%; padding: 0;">

		<div class="row ">
			<div class="mt-0 mb-0 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<div class="text-center">
					<div class="ms-1 border ps-1 pe-1 pt-1 pb-1" style="display: inline-block;">
						<i class="ps-1 pe-1 fa-duotone fa-solid fa-headphones"></i><span wicket:id="aid" class="ps-1 pe-1">21</span>
					</div>
				</div>
			</div>
		</div>

		<div class="mt-2" wicket:id="error" />

		<div wicket:id="textContainer" class="row">
			<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<div class="pb-2 text" wicket:id="info"></div>
			</div>
		</div>
	</div>


	<div wicket:id="audioContainer" style="margin-top: 96px; float:left; width: 100%; padding: 0;">
	
	
		<div class="alert alert-info audio-fixed-bottom" style="border-left:none; border-right:none; border-bottom:none;">

			<div class="row">
				<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">

					<div class="ps-3 pe-3 pt-4 pb-4">
						<div class="row align-items-center">
							<div class="  col">
								<div wicket:id="intro-audio" class="w-100">
									<div wicket:id="audio" class="w-100"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

</wicket:panel>
