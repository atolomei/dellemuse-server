<wicket:panel>

	<div class="row">
		<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 text-lg-start text-md-start text-xs-center">

			<div class="row">
				<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
					<span wicket:id="musicName"></span>
				</div>
			</div>

			<div class="row">
				<div class="mt-0 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
					<span class="text-secondary small" wicket:id="technicalInfo"></span>
				</div>
			</div>

			<div class="row mt-2">
				<div class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12">
					<div class="border">
					<span wicket:id="audioPlayer"></span>
					</div>
				</div>
			</div>

		</div>
	</div>

</wicket:panel>
