<wicket:panel>



	<div class="row text-center">
		<div
			class="text-lg-start text-xl-start text-xxl-start text-md-start col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div style="width: 100%; float: left;">

				<div wicket:id="qrcodeContainer" sstyle="width:100%; float:left;">


					<div class="row">
						<div class="mt-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<h4>
								<wicket:message key="qrcode" />
							</h4>
						</div>
					</div>

					<div class="row">
						<div class="mb-2 mt-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="btn btn-md btn-outline-primary pt-1 pb-1" wicket:id="make-qrcode"> <span> <wicket:message
										key="generate-qr-code" />
							</span>
							</a>
						</div>
					</div>




					<div class="row">
						<div class="ps-2 pe-2 mt-2 mb-0 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<span wicket:id="qrcode-text"></span>
						</div>
					</div>

					<div class="row">
						<div class="border ps-2 pe-2 mt-1 mb-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<img class="mt-2 mb-2 border ps-1 pe-1 pt-1 pb-1" style="max-width: 100%; max-height: 30em;" wicket:id="qrcode"></img>
						</div>
					</div>


					<div class="row">
						<div class="mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="pt-1 pb-1" wicket:id="qr-file-link" href="#"> <span wicket:id="qr-file-name"></span>
							</a>
						</div>
					</div>


					<!-- Audio Number PNG -->
					<div class="row">
						<div class="mt-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<h4>
								<wicket:message key="audio-number-png" />
							</h4>
						</div>
					</div>
					<div class="row">
						<div class="border ps-2 pe-2 mt-0 mb-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<img class="mt-2 mb-2 ps-1 pe-1 pt-1 pb-1" style="max-width: 100%; max-height: 10em;"
								wicket:id="audio-number-png-img"></img>
						</div>
					</div>
					<div class="row">
						<div class="mb-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="pt-1 pb-1" wicket:id="audio-number-png-link" href="#"> <span wicket:id="audio-number-png-name"></span>
							</a>
						</div>
					</div>
					<div class="row">
						<div class="mb-2 mt-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="btn btn-md btn-outline-primary pt-1 pb-1" wicket:id="make-audio-number-png"> <span> <wicket:message
										key="generate-audio-number-png" />
							</span>
							</a>
						</div>
					</div>


					<!-- PDF -->
					<div class="row">
						<div class="mt-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<h4>
								<wicket:message key="pdf" />
							</h4>
						</div>
					</div>

					<div class="row">
						<div class="mt-0 mb-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="pt-1 pb-1" wicket:id="qr-pdf-link" href="#" target="_blank"> <span wicket:id="qr-pdf-name"></span>
							</a>
						</div>
					</div>

					<div class="row">
						<div class="mb-2 mt-2 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
							<a class="btn btn-md btn-outline-primary pt-1 pb-1" wicket:id="make"> <span> <wicket:message
										key="generate-pdf" />
							</span>
							</a>
						</div>
					</div>

					<div class="mb-2 mt-2" wicket:id="error" />



				</div>

				 

			</div>


		</div>
	</div>



</wicket:panel>
