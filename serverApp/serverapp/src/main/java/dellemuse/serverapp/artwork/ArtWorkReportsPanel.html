<wicket:panel>

	<div class="row">
		<div class="mt-3 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<h4>
				<wicket:message key="title" />
			</h4>
		</div>
	</div>

	<!-- Date Range Selector -->
	<div class="row">
		<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<b><wicket:message key="date-range" /></b> 
		</div>
	</div>

	<div class="row">
		<div class="mt-0 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
			 <select wicket:id="rangeSelector" class="form-select" style="font-size:0.9em;"></select>
		</div>
	</div>

	<div wicket:id="reportContainer">

		<div class="row">
			<div class="mt-2 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<span><b><wicket:message key="users" /></b></span> 
			</div>
		</div>

		<div class="row">
			<div class="mt-1 mb-4 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item">
						<div class="row">
							<div class="col-xxl-8 col-xl-8 col-lg-8 col-md-8 col-sm-8 col-xs-12">
								<wicket:message key="total-users" />
							</div>
							<div class="col-xxl-4 col-xl-4 col-lg-4 col-md-4 col-sm-4 col-xs-12 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="totalSessions"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>

		<!-- Per Guide Breakdown -->
		<div class="row">
			<div class="mt-1 mb-1 col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<ul class="list-group">
					<li class="list-group-item" wicket:id="guideList">
						<div class="row">
							<div class="col-xxl-8 col-xl-8 col-lg-8 col-md-8 col-sm-8 col-xs-12">
								<span wicket:id="guideName"></span>
							</div>
							<div class="col-xxl-4 col-xl-4 col-lg-4 col-md-4 col-sm-4 col-xs-12 text-end">
								<span class="alert alert-info" style="padding: 0.3em 1em; border-radius: 4px;" wicket:id="guideSessions"></span>
							</div>
						</div>
					</li>
				</ul>
			</div>
		</div>

	</div>

</wicket:panel>
